services:
  weclawbot:
    build: .
    container_name: weclawbot-bridge
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3000'
    volumes:
      - gate-storage:/app/.wechatbot-gateway
    environment:
      - PORT=${PORT:-3000}
      - API_KEY=${API_KEY:-}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - SESSION_MAX_ROUNDS=${SESSION_MAX_ROUNDS:-0}
      - SESSION_EXPIRE_MS=${SESSION_EXPIRE_MS:-0}

volumes:
  gate-storage:
